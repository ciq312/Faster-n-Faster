services:
  postgres:
    ports: !reset []
    restart: unless-stopped
    max_connections: 500

  redis:
    ports: !reset []
    restart: unless-stopped
    max_connections: 500

  api:
    image: ghcr.io/ciq312/fasternfaster-api:latest
    ports: !reset []
    pull_policy: always
    restart: unless-stopped

  frontend:
    image: ghcr.io/ciq312/fasternfaster-frontend:latest
    ports: !reset []
    pull_policy: always
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
