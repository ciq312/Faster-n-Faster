services:
  postgres:
    ports: !reset []
    restart: unless-stopped

  redis:
    ports: !reset []

  api:
    ports: !reset []
    pull_policy: missing
    restart: unless-stopped

  frontend:
    ports: !reset []
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
