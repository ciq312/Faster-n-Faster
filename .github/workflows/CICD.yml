name: CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:

    runs-on: ubuntu-latest
    
    env:
      Solution_name: fasternfaster.api/FasterNFaster.Api.sln
      Test_project_path: fasternfaster.tests/FasterNFaster.Tests.csproj
      Api_project_path: fasternfaster.api/FasterNFaster.Api.csproj
      Api_project_name: FasterNFaster.Api.csproj
      
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore  ${{ env.Solution_name }}
    - name: Build
      run: dotnet build  ${{ env.Solution_name }} --no-restore
    - name: Test
      run: dotnet test  ${{ env.Test_project_path }} --no-build --verbosity normal

  integration-tests:
    runs-on: ubuntu-latest

    env:
      Integration_project_path: FasterNFaster.IntegrationTests/FasterNFaster.IntegrationTests.csproj

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore ${{ env.Integration_project_path }}
    - name: Test
      run: dotnet test ${{ env.Integration_project_path }} --verbosity normal

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fasternfasterapp
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: fasternfasterapp/package-lock.json
    - run: npm ci
    - run: npm run build

  publish-api:
    needs: [backend-build, integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: ./fasternfaster.api
        push: true
        tags: |
          ghcr.io/ciq312/fasternfaster-api:latest
          ghcr.io/ciq312/fasternfaster-api:${{ github.sha }}

  publish-frontend:
    needs: frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: ./fasternfasterapp
        push: true
        tags: |
          ghcr.io/ciq312/fasternfaster-frontend:latest
          ghcr.io/ciq312/fasternfaster-frontend:${{ github.sha }}

  deploy:
    needs: [publish-api, publish-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e
          cd /opt/Faster-n-Faster
          git pull --ff-only
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          docker image prune -f
